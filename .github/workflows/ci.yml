name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: astral-sh/setup-uv@v5
        with: { version: "latest" }
      - run: uv pip install --system ruff
      - run: ruff check src/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: astral-sh/setup-uv@v5
        with: { version: "latest" }
      - run: |
          uv pip install --system build
          python -m build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t fortigate-mcp-server .
